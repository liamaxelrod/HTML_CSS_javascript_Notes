    <!-- 3.1 EXPLANATION -->
    <h3>Explanation:</h3>
    <div class="explanation">
      
      <span class="C1">
        The SQL statement <code>SELECT * FROM Customers;</code></span><span> tells the database to return
        all rows and all columns from the <code>Customers</code> table.<br>

      
        The table shown in the example output is exactly what already exists in the database.
        This query does not modify the data — it only reads and displays it.<br><br>

      
        SQL (Structured Query Language) is the language used to communicate with a database.
        You can think of it like giving clear instructions to a librarian about which information
        you want to see.<br><br>

        Using a cabinet as a analogy:<br>
        - The cabinet is the database.<br>
        - Each drawer is a table (like <code>Customers</code>).<br>
        - Each folder is a row (one customer).<br>
        - Each page in the folder is a column value (name, city, country).<br><br>

        Columns have data types, such as string, numeric, or date/time, which define what kind
        of values they can store. Every column must have a name and a data type.<br>

        SQL provides a small set of core commands, such as SELECT, INSERT, UPDATE, DELETE, and WHERE.
        These act as the basic “verbs” for working with data.<br>

        SQL keywords are not case-sensitive, meaning <code>SELECT</code> and <code>select</code>
        are treated the same. Some database systems require a semicolon at the end of each statement,
        especially when multiple statements are sent together.<br>

        In a web application, SQL is typically used by a server-side language (such as PHP or ASP)
        to retrieve data from the database, while HTML and CSS are responsible for displaying
        that data to the user.
      </span><br><br>


      <!-- 3.2 NOTES -->
      <strong>Notes:</strong><br>
      <span>
        - Some databases are stricter about semicolons than others (MySQL often optional, Oracle required in scripts).<br>
        - ANSI compliance ensures basic SQL commands work similarly across systems.<br>
        - Data types vary slightly between systems; always check your RDBMS documentation.<br>
        - comment are made with /* text */ and -- text.
      </span><br><br>
      

      <!-- 3.3 CONCEPT & SPIRIT -->
      <strong>Concept & Spirit:</strong><br>
      <span>
        - SQL is a declarative language: you describe WHAT you want, not HOW to get it.<br>
        - Understanding table structure is critical before writing queries; you must know rows, columns, and types.<br>
        - Early habits: always use consistent case for readability; semicolons help prevent multi-statement errors.
      </span>
    </div>

<template> <!-- SQL: Operations -->
  <div class="bubble">

    <h3>SQL: Operations</h3>

    <!-- 0. TABLE EXAMPLE (Existing Data) -->
    <h3>Example: Table Preview</h3>
    <table class="example" border="1" cellspacing="0" cellpadding="5">
      <tr>
        <th>Value1</th><th>Value2</th>
      </tr>
      <tr>
        <td>10</td><td>5</td>
      </tr>
      <tr>
        <td>7</td><td>3</td>
      </tr>
    </table>

    <!-- 1. SQL CODE -->
    <h3>SQL Code:</h3>
    <div class="code_block">
      <code>
        SELECT Value1, Value2, 
              Value1 + Value2 AS Sum, 
              Value1 - Value2 AS Difference, 
              Value1 * Value2 AS Product, 
              Value1 / Value2 AS Quotient,
              Value1 % Value2 AS Remainder
        FROM Numbers;
      </code>
    </div>

    <!-- 2. EXAMPLE OUTPUT -->
    <h3>Example Output:</h3>
    <table class="example" border="1" cellspacing="0" cellpadding="5">
      <tr>
        <th>Value1</th><th>Value2</th><th>Sum</th><th>Difference</th><th>Product</th><th>Quotient</th><th>Remainder</th>
      </tr>
      <tr>
        <td>10</td><td>5</td><td>15</td><td>5</td><td>50</td><td>2</td><td>0</td>
      </tr>
      <tr>
        <td>7</td><td>3</td><td>10</td><td>4</td><td>21</td><td>2.3333</td><td>1</td>
      </tr>
    </table>

    <!-- 3. EXPLANATION -->
    <h3>Explanation:</h3>
    <div class="explanation">

      <!-- Arithmetic Operators -->
      <strong>Arithmetic Operators:</strong><br>
      <code>+</code> – Adds two values (2 + 3 = 5).<br>
      <code>-</code> – Subtracts one value from another (5 - 2 = 3).<br>
      <code>*</code> – Multiplies two values (2 * 3 = 6).<br>
      <code>/</code> – Divides one value by another (6 / 2 = 3).<br>
      <code>%</code> – Returns remainder (5 % 2 = 1).<br><br>

      <!-- Bitwise Operators -->
      <strong>Bitwise Operators:</strong><br>
      <code>&</code> – AND each bit of two numbers.<br>
      <code>|</code> – OR each bit of two numbers.<br>
      <code>^</code> – XOR each bit of two numbers.<br>
      <span>Note: MySQL uses integers for bitwise operations; behavior may vary in SQL Server/PostgreSQL.</span><br><br>

      <!-- Comparison Operators -->
      <strong>Comparison Operators:</strong><br>
      <code>=</code> – Equal to.<br>
      <code>></code> – Greater than.<br>
      <code><</code> – Less than.<br>
      <code>>=</code> – Greater than or equal.<br>
      <code><=</code> – Less than or equal.<br>
      <code><></code> – Not equal (can also use != in MySQL).<br><br>

      <!-- Compound Operators -->
      <strong>Compound Operators:</strong><br>
      <code>+=</code> – Add and assign.<br>
      <code>-=</code> – Subtract and assign.<br>
      <code>*=</code> – Multiply and assign.<br>
      <code>/=</code> – Divide and assign.<br>
      <code>%=</code> – Modulo and assign.<br>
      <code>&=</code> – Bitwise AND and assign.<br>
      <code>|=</code> – Bitwise OR and assign.<br>
      <code>^=</code> – Bitwise XOR and assign.<br>
      <span>Note: MySQL supports these in UPDATE statements; some older SQL versions may differ.</span><br><br>

      <!-- Logical Operators -->
      <strong>Logical Operators:</strong><br>
      <code>AND</code> – TRUE if both conditions are true.<br>
      <code>OR</code> – TRUE if either condition is true.<br>
      <code>NOT</code> – Reverses a condition.<br>
      <code>IN</code> – TRUE if value matches any in a list.<br>
      <code>BETWEEN</code> – TRUE if value is within a range.<br>
      <code>LIKE</code> – TRUE if pattern matches.<br>
      <code>EXISTS</code> – TRUE if subquery returns rows.<br>
      <code>ALL / ANY / SOME</code> – Compare with all/any values in a subquery.<br><br>

      <!-- NOTES -->
      <strong>Notes:</strong><br>
      - Arithmetic and bitwise operators are used in SELECT for calculations.<br>
      - Logical operators are key for filtering in WHERE clauses.<br>
      - Compound operators help update values more efficiently.<br>
      - Comparison operators return TRUE/FALSE and control conditional logic.<br><br>

      <!-- CONCEPT & SPIRIT -->
      <strong>Concept & Spirit:</strong><br>
      - MySQL operations let you calculate, compare, and filter data easily.<br>
      - Learning operators builds confidence in writing queries and prevents mistakes.<br>
      - Think of them as tools: arithmetic = math, bitwise = binary logic, comparison = checks, logical = combining conditions.<br>
      - Efficient use of operators leads to clearer, faster queries.
    </div>

  </div>
</template>
