        The table shown in the example output is exactly what already exists in the database.
        This query does not modify the data — it only reads and displays it.<br><br>

      
        SQL (Structured Query Language) is the language used to communicate with a database.
        You can think of it like giving clear instructions to a librarian about which information
        you want to see.<br><br>

        Using a cabinet as a analogy:<br>
        - The cabinet is the database.<br>
        - Each drawer is a table (like <code>Customers</code>).<br>
        - Each folder is a row (one customer).<br>
        - Each page in the folder is a column value (name, city, country).<br><br>

        Columns have data types, such as string, numeric, or date/time, which define what kind
        of values they can store. Every column must have a name and a data type.<br>

        SQL provides a small set of core commands, such as SELECT, INSERT, UPDATE, DELETE, and WHERE.
        These act as the basic “verbs” for working with data.<br>

        SQL keywords are not case-sensitive, meaning <code>SELECT</code> and <code>select</code>
        are treated the same. Some database systems require a semicolon at the end of each statement,
        especially when multiple statements are sent together.<br>

        In a web application, SQL is typically used by a server-side language (such as PHP or ASP)
        to retrieve data from the database, while HTML and CSS are responsible for displaying
        that data to the user.

      </span><br><br>
      

      <!-- 3.3 CONCEPT & SPIRIT -->

        - Understanding table structure is critical before writing queries; you must know rows, columns, and types.<br>
        - Early habits: always use consistent case for readability; semicolons help prevent multi-statement errors.
      </span>
    </div>

<template> <!-- SQL: Operations -->
  <div class="bubble">

    <h3>SQL: Operations</h3>

    <!-- 0. TABLE EXAMPLE (Existing Data) -->
    <h3>Example: Table Preview</h3>
    <table class="example" border="1" cellspacing="0" cellpadding="5">
      <tr>
        <th>Value1</th><th>Value2</th>
      </tr>
      <tr>
        <td>10</td><td>5</td>
      </tr>
      <tr>
        <td>7</td><td>3</td>
      </tr>
    </table>

    <!-- 1. SQL CODE -->
    <h3>SQL Code:</h3>
    <div class="code_block">
      <code>
        SELECT Value1, Value2, 
              Value1 + Value2 AS Sum, 
              Value1 - Value2 AS Difference, 
              Value1 * Value2 AS Product, 
              Value1 / Value2 AS Quotient,
              Value1 % Value2 AS Remainder
        FROM Numbers;
      </code>
    </div>

    <!-- 2. EXAMPLE OUTPUT -->
    <h3>Example Output:</h3>
    <table class="example" border="1" cellspacing="0" cellpadding="5">
      <tr>
        <th>Value1</th><th>Value2</th><th>Sum</th><th>Difference</th><th>Product</th><th>Quotient</th><th>Remainder</th>
      </tr>
      <tr>
        <td>10</td><td>5</td><td>15</td><td>5</td><td>50</td><td>2</td><td>0</td>
      </tr>
      <tr>
        <td>7</td><td>3</td><td>10</td><td>4</td><td>21</td><td>2.3333</td><td>1</td>
      </tr>
    </table>

    <!-- 3. EXPLANATION -->
    <h3>Explanation:</h3>
    <div class="explanation">

      <!-- Arithmetic Operators -->
      <strong>Arithmetic Operators:</strong><br>
      <code>+</code> – Adds two values (2 + 3 = 5).<br>
      <code>-</code> – Subtracts one value from another (5 - 2 = 3).<br>
      <code>*</code> – Multiplies two values (2 * 3 = 6).<br>
      <code>/</code> – Divides one value by another (6 / 2 = 3).<br>
      <code>%</code> – Returns remainder (5 % 2 = 1).<br><br>

      <!-- Bitwise Operators -->
      <strong>Bitwise Operators:</strong><br>
      <code>&</code> – AND each bit of two numbers.<br>
      <code>|</code> – OR each bit of two numbers.<br>
      <code>^</code> – XOR each bit of two numbers.<br>
      <span>Note: MySQL uses integers for bitwise operations; behavior may vary in SQL Server/PostgreSQL.</span><br><br>

      <!-- Comparison Operators -->
      <strong>Comparison Operators:</strong><br>
      <code>=</code> – Equal to.<br>
      <code>></code> – Greater than.<br>
      <code><</code> – Less than.<br>
      <code>>=</code> – Greater than or equal.<br>
      <code><=</code> – Less than or equal.<br>
      <code><></code> – Not equal (can also use != in MySQL).<br><br>

      <!-- Compound Operators -->
      <strong>Compound Operators:</strong><br>
      <code>+=</code> – Add and assign.<br>
      <code>-=</code> – Subtract and assign.<br>
      <code>*=</code> – Multiply and assign.<br>
      <code>/=</code> – Divide and assign.<br>
      <code>%=</code> – Modulo and assign.<br>
      <code>&=</code> – Bitwise AND and assign.<br>
      <code>|=</code> – Bitwise OR and assign.<br>
      <code>^=</code> – Bitwise XOR and assign.<br>
      <span>Note: MySQL supports these in UPDATE statements; some older SQL versions may differ.</span><br><br>

      <!-- Logical Operators -->
      <strong>Logical Operators:</strong><br>
      <code>AND</code> – TRUE if both conditions are true.<br>
      <code>OR</code> – TRUE if either condition is true.<br>
      <code>NOT</code> – Reverses a condition.<br>
      <code>IN</code> – TRUE if value matches any in a list.<br>
      <code>BETWEEN</code> – TRUE if value is within a range.<br>
      <code>LIKE</code> – TRUE if pattern matches.<br>
      <code>EXISTS</code> – TRUE if subquery returns rows.<br>
      <code>ALL / ANY / SOME</code> – Compare with all/any values in a subquery.<br><br>

      <!-- NOTES -->
      <strong>Notes:</strong><br>
      - Arithmetic and bitwise operators are used in SELECT for calculations.<br>
      - Logical operators are key for filtering in WHERE clauses.<br>
      - Compound operators help update values more efficiently.<br>
      - Comparison operators return TRUE/FALSE and control conditional logic.<br><br>

      <!-- CONCEPT & SPIRIT -->
      <strong>Concept & Spirit:</strong><br>
      - MySQL operations let you calculate, compare, and filter data easily.<br>
      - Learning operators builds confidence in writing queries and prevents mistakes.<br>
      - Think of them as tools: arithmetic = math, bitwise = binary logic, comparison = checks, logical = combining conditions.<br>
      - Efficient use of operators leads to clearer, faster queries.
    </div>

  </div>
</template>

      </span><br><br>

        - Learn to think in terms of **filters** and **patterns**.<br>

      <tr class="C3">
        <th>CustomerName</th><th>ContactName</th><th>Address</th>
      </tr>
      <tr>
        <td>Maria Anders</td><td>Maria A.</td><td>Berlin</td>
      </tr>
      <tr>
        <td>John Doe</td><td>John D.</td><td>No Address</td>
      </tr>
      <tr>
        <td>Linda Smith</td><td>Linda S.</td><td>New York</td>
      </tr>
    </table>

    <!-- 3. EXPLANATION -->
    <h3>Explanation:</h3>
    <div class="explanation">
      <span class="C1"><code>IS NULL</code></span><span> – Checks for fields that are empty or have a no value. Never use = NULL; always use IS NULL to correctly identify unknown values.</span><br>
      <span class="C2"><code>IS NOT NULL</code></span><span> – Checks for fields that contain all value (none can be empty). Useful for filtering out incomplete records.</span><br>
      <span class="C3"><code>IFNULL(Address, 'No Address')</code></span><span> – Replaces NULL values with a default, ensuring calculations or display logic don’t break. For SQL Server, use ISNULL(); for PostgreSQL/standard SQL, use COALESCE().</span><br><br>

      <!-- Notes -->
      <strong>Notes:</strong><br>
      <span>
        - NULL is different from zero or empty string – it represents unknown or missing data.<br>
        - Always use IS NULL / IS NOT NULL for testing NULLs; = or <> will not work.<br>
        - Using NULL functions helps avoid errors in aggregates like SUM() or AVG().
      </span><br><br>

      <!-- Concept & Spirit -->
      <strong>Concept & Spirit:</strong><br>
      <span>
        - Think of NULL as “unknown” rather than empty – it’s a signal that data is missing.<br>
        - Using IS NULL / IS NOT NULL teaches careful data validation and safety in queries.<br>
        - NULL replacement functions encourage defensive coding: you plan for missing data, ensuring reliable results and cleaner outputs.<br>
        - Big-picture: handling NULLs properly keeps your database queries accurate, predictable, and beginner-friendly.
      </span>
    </div>

  </div> 
</template>

<template> <!-- SQL: CASE -->
  <div class="bubble">

    <h3>SQL: CASE</h3>
    
    <!-- 0. TABLE EXAMPLE -->
    <h3>Example: Table Preview</h3>
    <table class="example" border="1" cellspacing="0" cellpadding="5">
      <tr>
        <th>OrderID</th><th>Quantity</th>
      </tr>
      <tr>
        <td>101</td><td>45</td>
      </tr>
      <tr>
        <td>102</td><td>30</td>
      </tr>
      <tr>
        <td>103</td><td>10</td>
      </tr>
      <tr>
        <td>104</td><td>25</td>
      </tr>
    </table>

    <!-- 1. SQL CODE -->
    <h3>SQL Code:</h3>
    <div class="code_block">
      <code>
        <!-- Example 1: CASE with ELSE -->
        SELECT OrderID, Quantity,<br>
        &nbsp;&nbsp;<span class="C1">CASE</span><br>
        &nbsp;&nbsp;&nbsp;&nbsp;<span class="C2">WHEN Quantity > 30 THEN 'Greater than 30'</span><br>
        &nbsp;&nbsp;&nbsp;&nbsp;<span class="C2">WHEN Quantity = 30 THEN 'Equals 30'</span><br>
        &nbsp;&nbsp;&nbsp;&nbsp;<span class="C3">ELSE 'Under 30'</span><br>
        &nbsp;&nbsp;<span class="C1">END AS OverUnderNull</span><br>
        FROM OrderDetails;<br><br>

        <!-- Example 2: CASE without ELSE -->
        SELECT OrderID, Quantity,<br>
        &nbsp;&nbsp;<span class="C1">CASE</span><br>
        &nbsp;&nbsp;&nbsp;&nbsp;<span class="C2">WHEN Quantity > 40 THEN 'Over 40'</span><br>
        &nbsp;&nbsp;&nbsp;&nbsp;<span class="C2">WHEN Quantity = 30 THEN 'Exactly 30'</span><br>
        &nbsp;&nbsp;<span class="C1">END AS OverUnderNull</span><br>
        FROM OrderDetails;
      </code>
    </div>

    <!-- 2. EXAMPLE OUTPUT -->
    <h3>Example Output:</h3>
    <table class="example" border="1" cellspacing="0" cellpadding="5">
      <tr>
        <th>OrderID</th><th>Quantity</th><th>OverUnderNull</th>
      </tr>
      <tr>
        <td>101</td><td>45</td><td>Greater than 30</td>
      </tr>
      <tr>
        <td>102</td><td>30</td><td>Equals 30</td>
      </tr>
      <tr>
        <td>103</td><td>10</td><td>Under 30</td>
      </tr>
      <tr>
        <td>104</td><td>25</td><td>Under 30</td>
      </tr>
    </table>

    <table class="example" border="1" cellspacing="0" cellpadding="5">
      <tr>
        <th>OrderID</th><th>Quantity</th><th>OverUnderNull</th>
      </tr>
      <tr>
        <td>101</td><td>45</td><td>Over 40</td>
      </tr>
      <tr>
        <td>102</td><td>30</td><td>Exactly 30</td>
      </tr>
      <tr>
        <td>103</td><td>10</td><td>NULL</td>
      </tr>
      <tr>
        <td>104</td><td>25</td><td>NULL</td>
      </tr>
    </table>

    <!-- 3.1 EXPLANATION -->
    <h3>Explanation:</h3>
    <div class="explanation">
      <span class="C1"><code>CASE ... END AS #####;</code></span><span> Wraps the entire conditional expression; CASE starts it, END closes it. AS ##### says what that new column's going to be called like OverUnderNull</span><br><br>
      <span class="C2"><code>WHEN condition THEN result;</code></span><span> Checks a condition; the first true one returns its result and stops further checks. So for instance, if nothing is greater than 30, only then do we go to the next condition state.</span><br><br>
      <span class="C3"><code>ELSE result;</code></span><span> Optional default value if none of the WHEN conditions match. If omitted, returns NULL for those conditions that were not met in the WHEN cases.</span><br><br>

      <!-- 3.2 NOTES -->
      <strong>Notes:</strong><br>
      <span>
        - CASE can be used in SELECT, WHERE, ORDER BY, and UPDATE statements.<br>
        - Multiple CASE statements can appear in a single query.<br>
      </span><br><br>

      <!-- 3.3 CONCEPT & SPIRIT -->
      <strong>Concept & Spirit:</strong><br>
      <span>
        - Teaches conditional thinking in SQL, similar to if-else in programming.<br>
        - Embeds logic in queries for readability and maintainability.<br>
        - Encourages planning the order of conditions carefully and handling defaults explicitly.
      </span>
    </div>


  </div>
</template>

<template> <!-- SQL: EXISTS, ANY, ALL -->
  <div class="bubble">

    <h3>SQL: EXISTS, ANY, ALL</h3>

    <!-- 0. TABLE EXAMPLE (Existing Data) -->
    <h3>Example: Table Preview</h3>
    <table class="example" border="1" cellspacing="0" cellpadding="5">
      <tr>
        <th>SupplierID</th><th>SupplierName</th><th>ProductName</th><th>Price</th>
      </tr>
      <tr>
        <td>1</td><td>Supplier A</td><td>Widget</td><td>15</td>
      </tr>
      <tr>
        <td>2</td><td>Supplier B</td><td>Gadget</td><td>25</td>
      </tr>
      <tr>
        <td>3</td><td>Supplier C</td><td>Doohickey</td><td>10</td>
      </tr>
    </table>

    <!-- 1. SQL CODE -->
    <h3>SQL Code:</h3>
    <div class="code_block">
      <code>
        <!-- EXISTS Example -->
        SELECT SupplierName FROM Suppliers<br>
        &nbsp;&nbsp;WHERE <span class="C1">EXISTS (SELECT ProductName FROM Products<br>
        &nbsp;&nbsp;&nbsp;&nbsp;WHERE Products.SupplierID = Suppliers.SupplierID AND Price &lt; 20);</span><br><br>

        <!-- ANY Example -->
        SELECT ProductName FROM Products<br>
        &nbsp;&nbsp;WHERE ProductID <span class="C2">= ANY (SELECT ProductID FROM OrderDetails WHERE Quantity = 10);</span><br><br>

        <!-- ALL Example -->
        SELECT ProductName FROM Products<br>
        &nbsp;&nbsp;WHERE ProductID <span class="C3">= ALL (SELECT ProductID FROM OrderDetails WHERE Quantity = 10);</span>
      </code>
    </div>

    <!-- 2. EXAMPLE OUTPUT -->
    <h3>Example Output:</h3>

    <table class="example" border="1" cellspacing="0" cellpadding="5">
      <tr class="C1">
        <th>SupplierName</th>
      </tr>
      <tr>
        <td>Supplier A</td>
      </tr>
      <tr>
        <td>Supplier C</td>
      </tr>
    </table>

    <table class="example" border="1" cellspacing="0" cellpadding="5">
      <tr class="C2">
        <th>ProductName</th>
      </tr>
      <tr>
        <td>Widget</td>
      </tr>
      <tr>
        <td>Doohickey</td>
      </tr>
    </table>

    <table class="example" border="1" cellspacing="0" cellpadding="5">
      <tr class="C3">
        <th>ProductName</th>
      </tr>
      <tr>
        <td>(no rows returned)</td>
      </tr>
    </table>

    <!-- 3.1 EXPLANATION -->
    <h3>Explanation:</h3>
    <div class="explanation">
      <span class="C1"><code>EXISTS</code></span><span> – Checks if at least one row in the subquery meets the condition. Returns TRUE/FALSE. Useful for yes/no checks without returning data from subquery.</span><br><br>
      <span class="C2"><code>ANY</code></span><span> – Compares a value to any value returned by a subquery. Returns TRUE if the comparison is true for at least one value. Works with standard comparison operators (=, &lt;&gt;, !=, &gt;, &gt;=, &lt;, &lt;=).</span><br><br>
      <span class="C3"><code>ALL</code></span><span> – Compares a value to all values returned by a subquery. Returns TRUE only if the comparison is true for every value. Also uses standard comparison operators.</span><br><br>

      <!-- 3.2 NOTES -->
      <strong>Notes:</strong><br>
      <span>
        - EXISTS is more efficient for large datasets when you only care about presence, not data.<br>
        - ANY is like an OR across the subquery results; ALL is like an AND.<br>
        - Use ALL carefully; if even one row doesn’t match, the condition is FALSE.<br>
        - EXISTS often replaces IN for performance in some SQL engines.
      </span><br><br>

      <!-- 3.3 CONCEPT & SPIRIT -->
      <strong>Concept & Spirit:</strong><br>
      <span>
        - Think of EXISTS as asking a yes/no question: "Does at least one row meet this criteria?"<br>
        - ANY and ALL teach how to reason about comparisons over ranges of values rather than single values.<br>
        - These operators help write expressive, declarative queries without looping manually over rows.<br>
        - Mastering them builds skill in thinking in set-based logic, a core SQL mindset.
      </span>
    </div>

  </div>

</template>

<template> <!-- SQL: MIN(), MAX(), COUNT(), SUM(), AVG()-->
  <div class="bubble">

    <h3>SQL: MIN(), MAX(), COUNT(), SUM(), AVG()</h3>

    <!-- 0. TABLE EXAMPLE -->
    <h3>Example: Products Table Preview</h3>
    <table class="example" border="1" cellspacing="0" cellpadding="5">
      <tr>
        <th>ProductID</th><th>ProductName</th><th>Price</th><th>CategoryID</th>
      </tr>
      <tr>
        <td>1</td><td>Keyboard</td><td>50</td><td>1</td>
      </tr>
      <tr>
        <td>2</td><td>Mouse</td><td>25</td><td>1</td>
      </tr>
      <tr>
        <td>3</td><td>Monitor</td><td>200</td><td>2</td>
      </tr>
      <tr>
        <td>4</td><td>USB Cable</td><td>10</td><td>1</td>
      </tr>
      <tr>
        <td>5</td><td>Webcam</td><td>80</td><td>2</td>
      </tr>
    </table>

    <!-- 1. SQL CODE -->
    <h3>SQL Code:</h3>
    <div class="code_block">
      <code>

        <!-- MIN -->
        <span class="C1">SELECT MIN(Price) AS LowestPrice</span><br>
        &nbsp;&nbsp;<span class="C1">FROM Products</span><br>
        &nbsp;&nbsp;<span class="C1">WHERE CategoryID = 1;</span><br><br>

        <!-- MAX -->
        <span class="C2">SELECT MAX(Price) AS HighestPrice</span><br>
        &nbsp;&nbsp;<span class="C2">FROM Products</span><br>
        &nbsp;&nbsp;<span class="C2">WHERE CategoryID = 1;</span><br><br>

        <!-- COUNT -->
        <span class="C3">SELECT COUNT(*) AS TotalProducts</span><br>
        &nbsp;&nbsp;<span class="C3">FROM Products</span><br>
        &nbsp;&nbsp;<span class="C3">WHERE Price &gt; 20;</span><br><br>

        <!-- SUM -->
        <span class="C4">SELECT SUM(Price) AS TotalCategoryOne</span><br>
        &nbsp;&nbsp;<span class="C4">FROM Products</span><br>
        &nbsp;&nbsp;<span class="C4">WHERE CategoryID = 1;</span><br><br>

        <!-- AVG -->
        <span class="C5">SELECT AVG(Price) AS AverageCategoryOne</span><br>
        &nbsp;&nbsp;<span class="C5">FROM Products</span><br>
        &nbsp;&nbsp;<span class="C5">WHERE CategoryID = 1;</span><br><br>

        <!-- GROUP BY Preview -->
        <span class="C6">SELECT CategoryID, SUM(Price) AS TotalPerCategory</span><br>
        &nbsp;&nbsp;<span class="C6">FROM Products</span><br>
        &nbsp;&nbsp;<span class="C6">GROUP BY CategoryID;</span>

      </code>
    </div>

    <!-- 2. EXAMPLE OUTPUT -->

    <h3>Example Output:</h3>

    <!-- MIN -->
    <table class="example" border="1" cellspacing="0" cellpadding="5">
      <tr class="C1">
        <th>LowestPrice</th>
      </tr>
      <tr>
        <td>10</td>
      </tr>
    </table>

    <!-- MAX -->
    <table class="example" border="1" cellspacing="0" cellpadding="5">
      <tr class="C2">
        <th>HighestPrice</th>
      </tr>
      <tr>
        <td>50</td>
      </tr>
    </table>

    <!-- COUNT -->
    <table class="example" border="1" cellspacing="0" cellpadding="5">
      <tr class="C3">
        <th>TotalProducts</th>
      </tr>
      <tr>
        <td>4</td>
      </tr>
    </table>

    <!-- SUM -->
    <table class="example" border="1" cellspacing="0" cellpadding="5">
      <tr class="C4">
        <th>TotalCategoryOne</th>
      </tr>
      <tr>
        <td>85</td>
      </tr>
    </table>

    <!-- AVG -->
    <table class="example" border="1" cellspacing="0" cellpadding="5">
      <tr class="C5">
        <th>AverageCategoryOne</th>
      </tr>
      <tr>
        <td>28.33</td>
      </tr>
    </table>

    <!-- GROUP BY Preview -->
    <table class="example" border="1" cellspacing="0" cellpadding="5">
      <tr class="C6">
        <th>CategoryID</th><th>TotalPerCategory</th>
      </tr>
      <tr>
        <td>1</td><td>85</td>
      </tr>
      <tr>
        <td>2</td><td>280</td>
      </tr>
    </table>

    <!-- 3. EXPLANATION -->
    <h3>Explanation:</h3>
    <div class="explanation">

      <span>
        SQL Aggregate Functions perform a calculation on multiple rows and return a single value.
        Without GROUP BY, all filtered rows are treated as one big group.
      </span><br><br>

      <span class="C1"><code>MIN()</code></span>
      <span> – Finds the smallest value in the filtered set.</span><br>

      <span class="C2"><code>MAX()</code></span>
      <span> – Finds the largest value in the filtered set.</span><br>

      <span class="C3"><code>COUNT()</code></span>
      <span> – Counts how many rows match the condition.</span><br>

      <span class="C4"><code>SUM()</code></span>
      <span> – Adds together all values from the filtered rows.</span><br>

      <span class="C5"><code>AVG()</code></span>
      <span> – Calculates the average value of the filtered rows.</span><br>

      <span class="C6"><code>GROUP BY</code></span>
      <span> – Instead of treating all rows as one group, SQL splits them by CategoryID.
      The aggregate function is then calculated separately for each category.
      This produces multiple rows instead of one.</span><br><br>

      <strong>Notes:</strong><br>
      <span>
        - Aggregate functions ignore NULL values (except COUNT(*)).<br>
        - WHERE filters rows before aggregation happens.<br>
        - Without GROUP BY → one result row.<br>
        - With GROUP BY → one result per group.<br>
        - GROUP BY will be fully explained in the next template.<br>
        - MIN(), MAX(), COUNT(), SUM(), AVG() are function names — they must always be followed by parentheses.<br>
        - The value inside the parentheses tells SQL what to calculate on.<br>
        - Example: SUM(Price) means "add all values from the Price column".<br>
        - You cannot leave the parentheses empty — SQL needs to know what column or expression to use.<br>
        - COUNT(*) is different: the * tells SQL to count all rows, not a specific column.
      </span><br><br>

      <strong>Concept & Spirit:</strong><br>
      <span>
        Aggregates teach you to summarize data instead of reading row by row.
        GROUP BY extends that idea by letting you summarize per category.
        This is where SQL becomes powerful: you describe the result you want,
        and the database handles the calculation.
      </span>

    </div>

  </div>

</template>

      <span class="C5"><code>ORDER BY Price ASC, ProductName DESC</code></span>

      <code>Price</code>, it then sorts those rows by <code>ProductName</code>.

      <span>
        - <code>ASC</code> is optional because ascending is default.<br>
        - ORDER BY always comes after WHERE (if used).<br>
        - You can sort by columns that are not shown in SELECT (in most SQL systems).<br>
        - Sorting does NOT change the table permanently — it only changes how results are displayed.
      </span><br><br>

      <!-- CONCEPT & SPIRIT -->
      <strong>Concept & Spirit:</strong><br>
      <span>
        Why didn’t we put this in the template earlier about select information?<br>

        The first templates focused on retrieving data (SELECT and WHERE).
        That teaches: <em>“Which rows do I want?”</em><br>

        ORDER BY teaches something different:
        <em>“In what order should I see them?”</em><br>

        Filtering (WHERE) decides WHAT data appears.<br>
        Sorting (ORDER BY) decides HOW it is organized.<br>

        We separate them because they teach two different mental models:
        - Selection logic (filtering)
        - Presentation logic (ordering)<br>

        Big beginner lesson:
        First think about getting the correct data.
        Then think about how you want it arranged.
      </span>

    </div>

  </div>

</template>

        GROUP BY Country<br>

        SELECT Country, COUNT(CustomerID)<br>
        FROM Customers<br>
        <span class="C2">WHERE Country != 'Brazil'</span><br>
        GROUP BY Country<br>
        <span class="C2">HAVING COUNT(CustomerID) >= 3;</span><br><br>

        
        SELECT Country, COUNT(CustomerID)<br>
        FROM Customers<br>
        GROUP BY Country<br>
        <span class="C3">HAVING COUNT(CustomerID) > 1<br>
        ORDER BY COUNT(CustomerID) DESC;</span>
        

      </code>
    </div>

    <!-- 2. EXAMPLE OUTPUT -->
    <h3>Example Output:</h3>

    <!-- C1 -->
    <table class="example" border="1" cellspacing="0" cellpadding="5">
      <tr class="C1">
        <th>Country</th><th>COUNT(CustomerID)</th>
      </tr>
      <tr><td>Germany</td><td>5</td></tr>
      <tr><td>Brazil</td><td>3</td></tr>
    </table>

    <!-- C2 -->
    <table class="example" border="1" cellspacing="0" cellpadding="5">
      <tr class="C2">
        <th>Country</th><th>COUNT(CustomerID)</th>
      </tr>
      <tr><td>Germany</td><td>5</td></tr>
    </table>

    <!-- C3 -->
    <table class="example" border="1" cellspacing="0" cellpadding="5">
      <tr class="C3">
        <th>Country</th><th>COUNT(CustomerID)</th>
      </tr>
      <tr><td>Germany</td><td>5</td></tr>
      <tr><td>Brazil</td><td>3</td></tr>
    </table>

    <!-- 3.1 EXPLANATION -->
    <h3>Explanation:</h3>
    <div class="explanation">

      <span class="C1"><code>HAVING COUNT(CustomerID) &gt; 3</code></span>
      <span>
      – After grouping customers by <code>Country</code>, HAVING filters the grouped results.
      We are no longer filtering individual rows — we are filtering entire groups.
      </span><br>

      <span class="C2"><code>WHERE Country != 'Brazil'</code></span>
      <span>
      – WHERE filters rows before grouping happens.
      Brazil rows are removed first.
      Then GROUP BY runs.
      Then HAVING filters the grouped result.
      </span><br>

      <span class="C3"><code>ORDER BY COUNT(CustomerID) DESC</code></span>
      <span>
      – HAVING decides which groups stay.
      ORDER BY decides how the final result is arranged.
      Sorting does not change the data — only the presentation.
      </span><br><br>

      <!-- NOTES -->
      <strong>Notes:</strong><br>
      <span>
        - WHERE cannot use aggregate functions like <code>COUNT()</code>.<br>
        - HAVING was added to SQL specifically to filter aggregated results.<br>
        - Clause order matters: FROM → WHERE → GROUP BY → HAVING → ORDER BY.<br>
        - If you try <code>WHERE COUNT(CustomerID) &gt; 3</code>, SQL will throw an error.
      </span><br><br>

      <!-- CONCEPT & SPIRIT -->
      <strong>Concept & Spirit:</strong><br>
      <span>
        Why is HAVING its own? HAVING now teaches: “How do I filter calculated categories?” This is a different mental step. WHERE filters raw rows. GROUP BY filters a group from the rows. HAVING filters summarized groups. <br>

        Big beginner lesson:<br>
        1. Filter rows (WHERE)<br>
        2. Group rows (GROUP BY)<br>
        3. Filter groups (HAVING)<br>
        4. Sort results (ORDER BY)<br>
        SQL works in stages. Understanding those stages is more important than memorizing syntax.

      </span>

    </div>
    
  </div>
</template>

<template> <!-- SQL: JOIN/INNER JOIN, LEFT JOIN, RIGHT JOIN, FULL OUTER JOIN, and SELF JOIN   -->
  <div class="bubble">

    <h3>SQL: JOIN/INNER JOIN, LEFT JOIN, RIGHT JOIN, FULL OUTER JOIN, and SELF JOIN</h3>

    <!-- 0. TABLE EXAMPLE (Existing Data) -->

    <h4>Customers Table</h4>

    <h4>Orders Table</h4>

    <!-- 1. SQL CODE -->
    <h3>SQL Code:</h3>
    <div class="code_block">
      <code>
        <!-- C1 – INNER JOIN -->

        ORDER BY Customers.CustomerName;<br><br>

        <!-- C3 – RIGHT JOIN -->
        SELECT Customers.CustomerName, Orders.OrderID, Orders.OrderDate<br>
        FROM Customers<br>
        <span class="C3">RIGHT JOIN Orders ON Customers.CustomerID = Orders.CustomerID</span><br>
        ORDER BY Orders.OrderID;<br><br>

        <!-- C4 – FULL OUTER JOIN -->
        SELECT Customers.CustomerName, Orders.OrderID, Orders.OrderDate<br>
        FROM Customers<br>
        <span class="C4">FULL OUTER JOIN Orders ON Customers.CustomerID = Orders.CustomerID</span><br>
        ORDER BY Customers.CustomerName;<br><br>

        <!-- C5 – SELF JOIN -->
        SELECT A.CustomerName AS Customer1, B.CustomerName AS Customer2, A.City<br>
        <span class="C5">FROM Customers A, Customers B<br>
        WHERE A.CustomerID &lt;&gt; B.CustomerID AND A.City = B.City</span><br>
        ORDER BY A.City;
      </code>
    </div>

    <!-- 2. EXAMPLE OUTPUT -->
    <h3>Example Output:</h3>

    <h4>RIGHT JOIN</h4>

      <tr><td>Maria Anders</td><td>101</td><td>2026-01-10</td></tr>
      <tr><td>Roland Mendel</td><td>102</td><td>2026-01-12</td></tr>
      <tr><td>NULL</td><td>103</td><td>2026-01-15</td></tr>
    </table>

    <h4>FULL OUTER JOIN</h4>
    <table class="example" border="1" cellspacing="0" cellpadding="5">
      <tr class="C4"><th>CustomerName</th><th>OrderID</th><th>OrderDate</th></tr>
      <tr><td>Francisco Chang</td><td>NULL</td><td>NULL</td></tr>
      <tr><td>Helen Bennett</td><td>NULL</td><td>NULL</td></tr>
      <tr><td>Maria Anders</td><td>101</td><td>2026-01-10</td></tr>
      <tr><td>Roland Mendel</td><td>102</td><td>2026-01-12</td></tr>
      <tr><td>NULL</td><td>103</td><td>2026-01-15</td></tr>
    </table>

    <h4>SELF JOIN</h4>
    <table class="example" border="1" cellspacing="0" cellpadding="5">
      <tr class="C5"><th>Customer1</th><th>Customer2</th><th>City</th></tr>
      <tr><td>Maria Anders</td><td>Roland Mendel</td><td>Berlin</td></tr>
      <tr><td>Roland Mendel</td><td>Maria Anders</td><td>Berlin</td></tr>
    </table>

    <!-- 3.1 EXPLANATION -->
    <h3>Explanation:</h3>
    <div class="explanation">
      <span>With ON, it looks for a column of data that Is similar or the same data and JOIN depending on which one will join the data if they're the same</span><br>
      <span class="C1"><code>INNER JOIN</code></span><span> – Returns only the rows where there’s a match in both tables. Rows without matches are ignored.</span><br>
      <span class="C2"><code>LEFT JOIN</code></span><span> – Returns all rows from the left table; unmatched rows in the right table appear as NULL.</span><br>
      <span class="C3"><code>RIGHT JOIN</code></span><span> – Returns all rows from the right table; unmatched rows in the left table appear as NULL.</span><br>
      <span class="C4"><code>FULL OUTER JOIN</code></span><span> – Returns all rows from both tables; unmatched rows appear as NULL where there’s no match.<br>
        - MySQL does not support FULL OUTER JOIN directly. It can be simulated using LEFT JOIN UNION RIGHT JOIN.</span><br>
      <span class="C5"><code>SELF JOIN</code></span><span> – Joins a table to itself; useful for finding relationships within the same table (e.g., customers in the same city).<br>
      Where is the SELF JOIN? I don’t see the word JOIN anywhere.”<br>
      That’s because this is the old (implicit) way of writing a self join.</span><br>
      SELF JOIN = FROM Customers A, Customers B<br>
      ON = WHERE A.CustomerID <> B.CustomerID AND A.City = B.City<br><br>

      <strong>Notes:</strong><br>
      <span>
        - SQL creates a temporary combined result. That result is returned to you. Then it disappears.
        - Always specify table names when column names exist in multiple tables.<br>
        - JOIN defaults to INNER JOIN.<br>
        - Use aliases (A, B) for clarity in SELF JOINs.<br>
        - LEFT/RIGHT/FULL JOIN help handle missing relationships elegantly.
      </span><br><br>

      <strong>Concept & Spirit:</strong><br>
      <span>
        - Joins teach how relational databases combine related data across tables.<br>
        - Understand the difference between "all rows" vs "matched rows".<br>
        - Thinking in sets: each JOIN type answers a different question about relationships between tables.<br>
        - Builds the mindset of designing queries that reflect real-world data connections.
      </span>
    </div>

  </div>

        <!-- C4 UNION with WHERE -->
        <span class="C4">SELECT City, Country FROM Customers<br>

    <h3>Explanation:</h3>
    <div class="explanation">

      <span class="C1"><code>UNION</code></span>
      <span>
        – Combines result sets and automatically removes duplicate rows.
      </span><br>

      <span class="C2"><code>UNION ALL</code></span>
      <span>
        – Combines result sets but keeps duplicates. Faster because no duplicate-check step happens.
      </span><br>

      <span class="C3"><code>Multiple UNION statements</code></span><br>
      <span>
        You can combine more than two SELECT statements.<br>
        Each additional UNION keeps stacking results vertically.<br>
        This works also for UNION ALL
      </span><br>

      <span class="C4"><code>WHERE + UNION</code></span>
      <span>
        – Each SELECT filters independently before combining.
      </span><br><br>

      <strong>Notes:</strong><br>
      <span>
        - All SELECT statements must have the same number of columns.<br>
        &nbsp;&nbsp;-- ✅ Works: same number of columns<br>
        &nbsp;&nbsp;SELECT City, Country FROM Customers<br>
        &nbsp;&nbsp;UNION<br>
        &nbsp;&nbsp;SELECT City, Country FROM Suppliers;<br><br>

        &nbsp;&nbsp;-- ❌ Error: different number of columns<br>
        &nbsp;&nbsp;SELECT City FROM Customers<br>
        &nbsp;&nbsp;UNION<br>
        &nbsp;&nbsp;SELECT City, Country FROM Suppliers;<br><br>
        - Column data types must be compatible.<br>
        - Column order must match exactly.<br>
        - Result column names come from the first SELECT statement.
      </span><br><br>

      <strong>UNION vs JOIN:</strong><br>
      <span>
        - UNION adds rows (vertical merge).<br>
        - JOIN adds columns (horizontal merge using keys).<br><br>
        UNION = stack data.<br>
        JOIN = connect related data.
      </span><br><br>

      <strong>Concept & Spirit:</strong><br>
      <span>
        UNION teaches consolidation of similar structured datasets. 
        It reinforces thinking about compatibility and schema alignment. 
        JOIN teaches relationships. UNION teaches structural merging.
      </span>

    </div>

  </div>

</template>

      <strong>Additional Notes:</strong><br>

      </span><br><br>

      <strong>Concept & Spirit:</strong><br>

      <span class="C2"><code>UPDATE (no WHERE)</code></span><span> – Updates all rows! Use carefully; usually a beginner mistake.</span><br>
      <span class="C3"><code>DELETE FROM ... WHERE</code></span><span> – Deletes only the records that match the condition.</span><br>
      <span class="C4"><code>DELETE FROM ...</code></span><span> – Deletes all records but keeps the table structure.</span><br>

      <!-- 3.3 CONCEPT & SPIRIT -->

<template> <!-- SQL: CREATE DATABASE, SHOW DATABASES, DROP DATABASE, and BACKUP DATABASE -->
  <div class="bubble">

    <h3>SQL: CREATE DATABASE, SHOW DATABASES, DROP DATABASE, and BACKUP DATABASE</h3>

    <!-- 0. TABLE EXAMPLE (Database List Preview) -->
    <h3>Example: Preview Database</h3>
    <table class="example" border="1" cellspacing="0" cellpadding="5">
      <tr>
        <th>Database</th>
      </tr>
      <tr>
        <td>master</td>
      </tr>
      <tr>
        <td>model</td>
      </tr>
    </table>

    <!-- 1. SQL CODE -->
    <h3>SQL Code:</h3>
    <div class="code_block">
      <code>

        <!-- C1 CREATE DATABASE -->
        <span class="C1">CREATE DATABASE testDB;</span><br><br>

        <!-- C2 SHOW DATABASES -->
        <span class="C2">SHOW DATABASES;</span><br><br>

        <!-- C3 DROP DATABASE -->
        <span class="C3">DROP DATABASE model;</span><br><br>

        <!-- C4 BACKUP DATABASE (Full) -->
        <span class="C4">BACKUP DATABASE testDB</span><br>
        <span class="C4">&nbsp;&nbsp;TO DISK = 'D:\backups\testDB.bak';</span><br><br>

        <!-- C5 BACKUP DATABASE (Differential) -->
        <span class="C5">BACKUP DATABASE testDB</span><br>
        <span class="C5">&nbsp;&nbsp;TO DISK = 'D:\backups\testDB.bak'</span><br>
        <span class="C5">&nbsp;&nbsp;WITH DIFFERENTIAL;</span>

      </code>
    </div>

    <!-- 2. EXAMPLE OUTPUT -->

    <!-- C1 + C2 OUTPUT -->
    <h3>Example Output:</h3>
    <table class="example" border="1" cellspacing="0" cellpadding="5">
      <tr class="C1">
        <th>Database</th>
      </tr>
      <tr>
        <td>master</td>
      </tr>
      <tr>
        <td>model</td>
      </tr>
      <tr class="C1">
        <td>testDB</td>
      </tr>
    </table>

    <!-- C3 OUTPUT -->
    <table class="example" border="1" cellspacing="0" cellpadding="5">
      <tr class="C2">
        <th>Database</th>
      </tr>
      <tr>
        <td>master</td>
      </tr>
      <tr>
        <td>model</td>
      </tr>
      <!-- testDB no longer appears -->
    </table>

    <!-- C3 OUTPUT -->
    <table class="example" border="1" cellspacing="0" cellpadding="5">
      <tr class="C3">
        <th>Database</th>
      </tr>
      <tr>
        <td>master</td>
      </tr>
    </table>

    <!-- 3.1 EXPLANATION -->
    <h3>Explanation:</h3>
    <div class="explanation">

      <span class="C1"><code>CREATE DATABASE testDB;</code></span><br>
      <span> – Creates a brand new database container named <code>testDB</code>. Think of a database like a large empty warehouse. At this stage, it has no tables inside — it is just the structure that will hold tables later.</span><br><br>

      <span class="C2"><code>SHOW DATABASES;</code></span><br>
      <span> – Displays all databases on the server. This is like asking, “What warehouses currently exist?” It helps you confirm that your new database was successfully created.</span><br><br>

      <span class="C3"><code>DROP DATABASE testDB;</code></span><br>
      <span> – Permanently deletes the entire database and everything inside it. This is equivalent to demolishing the entire warehouse. All tables and data inside are completely removed.</span><br><br>

      <span class="C4"><code>BACKUP DATABASE testDB TO DISK</code></span><br>
      <span> – Creates a full backup of the database (SQL Server). This copies everything — tables, data, structure — into a backup file. Think of it as creating a full duplicate safety copy.</span><br><br>

      <span class="C5"><code>WITH DIFFERENTIAL</code></span><br>
      <span> – Creates a differential backup. Instead of copying everything again, it only copies changes made since the last full backup. This saves time and storage.</span><br><br>

      <!-- NOTES -->
      <strong>Notes:</strong><br>
      <span>
        - You must have admin privileges to create or drop databases.<br>
        - Dropping a database cannot be undone unless you have a backup.<br>
        - Backups should always be stored on a different disk than the database.<br>
        - BACKUP DATABASE is specific to SQL Server; other systems (like MySQL) use different tools.<br>
        - Differential backups reduce backup time because only changes are saved.
      </span><br><br>

      <!-- CONCEPT & SPIRIT -->
      <strong>Concept & Spirit:</strong><br>
      <span>
        - Databases are containers. Before tables and data, you must create the container.<br>
        - Power commands like DROP DATABASE teach responsibility — SQL gives you strong control, but you must use it carefully.<br>
        - Backups reflect a core engineering principle: Always plan for failure. Systems crash. Disks fail. Good developers design with recovery in mind.<br>
        - The mindset here is infrastructure thinking: not just writing queries, but managing systems safely.
      </span>

    </div>

  </div>

</template>

<template> <!-- Template 3: SQL: NOT NULL, UNIQUE, PRIMARY KEY, FOREIGN KEY, CHECK, DEFAULT -->
  <div class="bubble">

    <h3>SQL: NOT NULL, UNIQUE, PRIMARY KEY, FOREIGN KEY, CHECK, DEFAULT</h3>

    <!-- 0. TABLE STRUCTURE PREVIEW -->
    <h3>Example: Table Structure with Constraints</h3>
    <table class="example" border="1" cellspacing="0" cellpadding="5">
      <tr>
        <th>Column</th><th>Data Type</th><th>Constraint</th>
      </tr>
      <tr>
        <td>ID</td><td>INT</td><td>NOT NULL</td>
      </tr>
      <tr>
        <td>Email</td><td>VARCHAR(255)</td><td>UNIQUE</td>
      </tr>
      <tr>
        <td>ProductID</td><td>INT</td><td>PRIMARY KEY</td>
      </tr>
      <tr>
        <td>PersonID</td><td>INT</td><td>FOREIGN KEY → Persons(ID)</td>
      </tr>
      <tr>
        <td>Age</td><td>INT</td><td>CHECK (Age ≥ 18)</td>
      </tr>
      <tr>
        <td>City</td><td>VARCHAR(255)</td><td>DEFAULT 'Sandnes'</td>
      </tr>
    </table>

    <!-- 1. SQL CODE -->
    <h3>SQL Code (Table Creation):</h3>
    <div class="code_block">
      <code>

        <!-- C1 NOT NULL -->
        <span class="C1">CREATE TABLE Persons (<br>
        &nbsp;&nbsp;ID INT NOT NULL,<br>
        &nbsp;&nbsp;FirstName VARCHAR(255) NOT NULL,<br>
        &nbsp;&nbsp;LastName VARCHAR(255) NOT NULL<br>
        );</span><br><br>

        <!-- C2 UNIQUE -->
        <span class="C2">CREATE TABLE Users (<br>
        &nbsp;&nbsp;UserID INT,<br>
        &nbsp;&nbsp;Email VARCHAR(255),<br>
        &nbsp;&nbsp;UNIQUE (Email)<br>
        );</span><br><br>

        <!-- C3 PRIMARY KEY -->
        <span class="C3">CREATE TABLE Products (<br>
        &nbsp;&nbsp;ProductID INT,<br>
        &nbsp;&nbsp;ProductName VARCHAR(255),<br>
        &nbsp;&nbsp;PRIMARY KEY (ProductID)<br>
        );</span><br><br>

        <!-- C4 FOREIGN KEY -->
        <span class="C4">CREATE TABLE Orders (<br>
        &nbsp;&nbsp;OrderID INT,<br>
        &nbsp;&nbsp;PersonID INT,<br>
        &nbsp;&nbsp;PRIMARY KEY (OrderID),<br>
        &nbsp;&nbsp;FOREIGN KEY (PersonID) REFERENCES Persons(ID)<br>
        );</span><br><br>

        <!-- C5 CHECK -->
        <span class="C5">CREATE TABLE Adults (<br>
        &nbsp;&nbsp;ID INT,<br>
        &nbsp;&nbsp;Age INT,<br>
        &nbsp;&nbsp;CHECK (Age >= 18)<br>
        );</span><br><br>

        <!-- C6 DEFAULT -->
        <span class="C6">CREATE TABLE Customers (<br>
        &nbsp;&nbsp;ID INT,<br>
        &nbsp;&nbsp;City VARCHAR(255) DEFAULT 'Sandnes'<br>
        );</span>

      </code>
    </div>

    <!-- 2. CONSTRAINT BEHAVIOR TESTS -->
    <h3>Constraint Behavior Tests:</h3>

    <div class="code_block">
      <code>

        <code class="C1">-- C1 NOT NULL</code><br>
        INSERT INTO Persons VALUES (1, 'Liam', 'Axelrod');<br>
        -- ✅ Success<br><br>

        INSERT INTO Persons VALUES (NULL, 'Anna', 'Smith');<br>
        -- ❌ ERROR 1048 (23000): Column 'ID' cannot be null<br><br><br>

        <code class="C2">-- C2 UNIQUE</code><br>
        INSERT INTO Users VALUES (1, 'test@email.com');<br>
        -- ✅ Success<br><br>

        INSERT INTO Users VALUES (2, 'test@email.com');<br>
        -- ❌ ERROR 1062 (23000): Duplicate entry 'test@email.com' for key 'Email'<br><br><br>

        <code class="C3">-- C3 PRIMARY KEY</code><br>
        INSERT INTO Products VALUES (100, 'Laptop');<br>
        -- ✅ Success<br><br>

        INSERT INTO Products VALUES (100, 'Tablet');<br>
        -- ❌ ERROR 1062 (23000): Duplicate entry '100' for key 'PRIMARY'<br><br><br>

        <code class="C4">-- C4 FOREIGN KEY</code><br>
        INSERT INTO Persons VALUES (10, 'John', 'Doe');<br>
        -- ✅ Success (Parent row exists)<br><br>

        INSERT INTO Orders VALUES (1, 10);<br>
        -- ✅ Success (PersonID 10 exists)<br><br>

        INSERT INTO Orders VALUES (2, 999);<br>
        -- ❌ ERROR 1452 (23000): Cannot add or update a child row: a foreign key constraint fails<br><br><br>

        <code class="C5">-- C5 CHECK</code><br>
        INSERT INTO Adults VALUES (1, 25);<br>
        -- ✅ Success<br><br>

        INSERT INTO Adults VALUES (2, 16);<br>
        -- ❌ ERROR 3819 (HY000): Check constraint 'Adults_chk_1' is violated.<br><br><br>

        <code class="C6">-- C6 DEFAULT</code><br>
        INSERT INTO Customers (ID) VALUES (1);<br>
        -- ✅ Success (City automatically set to 'Sandnes')<br>

      </code>
    </div>

    <!-- 3. EXPLANATION -->
    <h3>Explanation:</h3>
    <div class="explanation">

      <span class="C1"><code>NOT NULL</code></span>
      <span> – The first insert succeeded because ID had a value.  
      The second failed because NULL violates the NOT NULL rule, so the database rejected the row immediately.</span><br><br>

      <span class="C2"><code>UNIQUE</code></span>
      <span> – The first email worked because it was new.  
      The second failed because the value already existed. UNIQUE prevents duplicate values in that column.</span><br><br>

      <span class="C3"><code>PRIMARY KEY</code></span>
      <span> – The first ProductID was unique, so it succeeded.  
      The second failed because PRIMARY KEY enforces uniqueness and does not allow duplicates.</span><br><br>

      <span class="C4"><code>FOREIGN KEY</code></span>
      <span> – The insert into Orders with PersonID 10 succeeded because that ID exists in the Persons table.  
      The insert with PersonID 999 failed because no matching parent row exists.  
      FOREIGN KEY protects relationships between tables.</span><br><br>

      <span class="C5"><code>CHECK</code></span>
      <span> – Age 25 passed because it satisfies the condition (Age ≥ 18).  
      Age 16 failed because it violates the CHECK rule.</span><br><br>

      <span class="C6"><code>DEFAULT</code></span>
      <span> – The insert succeeded even without specifying City because the database automatically filled in 'Sandnes'.  
      DEFAULT prevents missing data without throwing an error.</span><br><br>

      <strong>Notes:</strong><br>
      <span>
        - Error codes shown are MySQL-style (ANSI behavior).<br>
        - CHECK constraints are enforced in MySQL 8+. Older versions ignored them.<br>
        - FOREIGN KEY requires the parent table to exist first.<br>
        - Constraints are enforced by the database engine, not your application.
      </span><br><br>

      <strong>Concept & Spirit:</strong><br>
      <span>
        - Constraints act as the database’s immune system.<br>
        - They prevent corruption at the structural level.<br>
        - Valid data flows through. Invalid data is rejected instantly.<br>
        - This is defensive engineering: build systems that protect themselves.
      </span>

    </div>

  </div>

</template>

<template> <!-- SQL: CREATE INDEX, CREATE UNIQUE INDEX, DROP INDEX, AUTO_INCREMENT, and ALTER TABLE name AUTO_INCREMENT -->
  <div class="bubble">

    <h3>SQL: CREATE INDEX, CREATE UNIQUE INDEX, DROP INDEX, AUTO_INCREMENT, and ALTER TABLE name AUTO_INCREMENT</h3>

    <!-- 0. TABLE EXAMPLE (Existing Data) -->
    <h3>Example: Table Preview</h3>
    <table class="example" border="#" cellspacing="#" cellpadding="#">
      <tr>
        <th>Personid</th><th>FirstName</th><th>LastName</th>
      </tr>
      <tr>
        <td>1</td><td>Lars</td><td>Monsen</td>
      </tr>
      <tr>
        <td>2</td><td>Anna</td><td>Smith</td>
      </tr>
    </table>

    <!-- 1. SQL CODE -->
    <h3>SQL Code:</h3>
    <div class="code_block">
      <code>

        <!-- C1: Basic Index -->
        <span class="C1">CREATE INDEX idx_lastname</span><br>
        &nbsp;&nbsp;<span class="C1">ON Persons (LastName);</span><br><br>

        <!-- C2: Multi-column Index -->
        <span class="C2">CREATE INDEX idx_fullname</span><br>
        &nbsp;&nbsp;<span class="C2">ON Persons (LastName, FirstName);</span><br><br>

        <!-- C3: Unique Index -->
        <span class="C3">CREATE UNIQUE INDEX idx_unique_email</span><br>
        &nbsp;&nbsp;<span class="C3">ON Persons (Email);</span><br><br>

        <!-- C4: Drop Index -->
        <span class="C4">ALTER TABLE Persons</span><br>
        &nbsp;&nbsp;<span class="C4">DROP INDEX idx_lastname;</span><br><br>

        <!-- C5: AUTO_INCREMENT Table -->
        <span class="C5">CREATE TABLE Persons (</span><br>
        &nbsp;&nbsp;<span class="C5">Personid INT NOT NULL AUTO_INCREMENT,</span><br>
        &nbsp;&nbsp;<span class="C5">LastName VARCHAR(255) NOT NULL,</span><br>
        &nbsp;&nbsp;<span class="C5">FirstName VARCHAR(255),</span><br>
        &nbsp;&nbsp;<span class="C5">PRIMARY KEY (Personid)</span><br>
        <span class="C5">);</span><br><br>

        <!-- C6: Insert Without ID -->
        <span class="C6">INSERT INTO Persons (FirstName, LastName)</span><br>
        &nbsp;&nbsp;<span class="C6">VALUES ('Lars', 'Monsen');</span><br><br>

        <!-- C7: Change Starting Value -->
        <span class="C7">ALTER TABLE Persons AUTO_INCREMENT = 100;</span>

      </code>
    </div>

    <h3>Example Output:</h3>

    <table class="example" border="1" cellspacing="0" cellpadding="5">
      <tr class="C6">
        <th>Personid</th><th>FirstName</th><th>LastName</th>
      </tr>
      <tr>
        <td>3</td><td>Lars</td><td>Monsen</td>
      </tr>
    </table>

    <!-- 3. EXPLANATION -->
    <h3>Explanation:</h3>
    <div class="explanation">

      <span class="C1"><code>CREATE INDEX</code></span>
      <span> – Creates a lookup structure for one column. Think of it like an index in the back of a book: instead of scanning every page (row), the database jumps directly to matches.</span><br><br>

      <span class="C2"><code>Multi-column Index</code></span>
      <span> – Works like a sorted phonebook: ordered first by LastName, then FirstName. It is most useful when queries filter using both columns together. Order matters.</span><br><br>

      <span class="C3"><code>CREATE UNIQUE INDEX</code></span>
      <span> – Same speed benefit as a normal index, but also prevents duplicate values. It enforces uniqueness without necessarily being a primary key.</span><br><br>

      <span class="C4"><code>DROP INDEX</code></span>
      <span> – Removes the lookup structure. The table data remains unchanged — only the performance optimization is removed.</span><br><br>

      <strong>How Index Types Differ:</strong><br>
      <span>
        - Basic index → improves search speed only.<br>
        - Multi-column index → improves combined-column searches.<br>
        - Unique index → improves search speed AND enforces uniqueness.<br>
      </span><br>

      <span class="C5"><code>AUTO_INCREMENT</code></span>
      <span> – Automatically generates a new unique number when inserting a record. Usually used for primary keys so developers don’t manually manage IDs.</span><br><br>

      <span class="C6"><code>INSERT without specifying Personid</code></span>
      <span> – This exists because the database handles ID generation. If you manually inserted IDs, you could accidentally create duplicates or break relationships. AUTO_INCREMENT removes human error.</span><br><br>

      <span class="C7"><code>ALTER TABLE ... AUTO_INCREMENT</code></span>
      <span> – Changes the NEXT number the database will assign. It does NOT change existing IDs. It only affects future inserts.</span><br><br>

      <!-- NOTES -->
      <strong>Notes:</strong><br>
      <span>
        - You can only change the starting/next value using <code>ALTER TABLE ... AUTO_INCREMENT</code> in MySQL.<br>
        - You cannot reset existing row IDs using this command.<br>
        - If the table already contains higher numbers, MySQL will ignore lower AUTO_INCREMENT values.<br>
        - Indexes speed up SELECT queries but slow down INSERT/UPDATE because indexes must also update.<br>
        - In SQL Server, use <code>IDENTITY(start, increment)</code> instead of AUTO_INCREMENT.<br>
        - In Oracle, use a <code>SEQUENCE</code> object.<br>
        - Never over-index a table — each index adds storage and maintenance cost.
      </span><br><br>

      <!-- CONCEPT & SPIRIT -->
      <strong>Concept & Spirit:</strong><br>
      <span>
        - Indexing teaches performance tradeoffs: faster reads vs slower writes.<br>
        - AUTO_INCREMENT teaches delegation: let the database manage identity safely.<br>
        - ALTER TABLE teaches controlled structural change — you modify structure carefully, not data recklessly.
      </span>

    </div>

  </div>
</template>

<template> <!-- SQL: OrderDate, CREATE VIEW, CREATE OR REPLACE VIEW, and DROP VIEW -->
  <div class="bubble">

    <h3>SQL: OrderDate, CREATE VIEW, CREATE OR REPLACE VIEW, and DROP VIEW</h3>

    <!-- 0. TABLE EXAMPLE (Existing Data) -->
    <h3>Example: Orders Table Preview</h3>
    <table class="example" border="1" cellspacing="0" cellpadding="5">
      <tr>
        <th>OrderId</th><th>ProductName</th><th>OrderDate</th>
      </tr>

      </tr>
      <tr>

      </tr>
      <tr>
        <td>4</td><td>Mascarpone Fabioli</td><td>2008-10-29</td>
      </tr>
    </table>

    <!-- 1. SQL CODE -->
    <h3>SQL Code:</h3>
    <div class="code_block">
      <code>
        <span class="C1">SELECT * FROM Orders WHERE OrderDate = '2008-11-11';</span><br><br>

        <span class="C2">CREATE VIEW Brazil_Customers AS</span><br>
        &nbsp;&nbsp;<span class="C2">SELECT CustomerName, ContactName</span><br>
        &nbsp;&nbsp;<span class="C2">FROM Customers</span><br>
        &nbsp;&nbsp;<span class="C2">WHERE Country = 'Brazil';</span><br><br>

        <span class="C3">SELECT * FROM Brazil_Customers;</span><br><br>

        <span class="C4">CREATE OR REPLACE VIEW Brazil_Customers AS</span><br>
        &nbsp;&nbsp;<span class="C4">SELECT CustomerName, ContactName, City</span><br>
        &nbsp;&nbsp;<span class="C4">FROM Customers</span><br>
        &nbsp;&nbsp;<span class="C4">WHERE Country = 'Brazil';</span><br><br>

        <span class="C5">DROP VIEW Brazil_Customers;</span>
      </code>
    </div>

    <!-- 2. EXAMPLE OUTPUT -->
    <h3>Example Output:</h3>

    <table class="example" border="1" cellspacing="0" cellpadding="5">
      <tr class="C1">
        <th>OrderId</th><th>ProductName</th><th>OrderDate</th>
      </tr>
      <tr>
        <td>1</td><td>Geitost</td><td>2008-11-11</td>
      </tr>
      <tr>
        <td>3</td><td>Mozzarella di Giovanni</td><td>2008-11-11</td>
      </tr>
    </table>

    <table class="example" border="1" cellspacing="0" cellpadding="5">
      <span class="d2 dot"></span><span class="d3 dot"></span>
      <tr>
        <th>CustomerName</th><th>ContactName</th>
      </tr>
      <tr>
        <td>Ana Trujillo</td><td>Ana Trujillo</td>
      </tr>
      <tr>
        <td>Ricardo Adocicados</td><td>Maria Silva</td>
      </tr>
    </table>

    <!-- 3. EXPLANATION -->
    <h3>Explanation:</h3>
    <div class="explanation">

      <span class="C1"><code>WHERE OrderDate = '2008-11-11'</code></span>
      <span> – Dates must match the column’s format exactly. If the column is <code>DATE</code> (YYYY-MM-DD), this works perfectly. But if the column includes time (DATETIME), this comparison will fail because the time part must also match.</span><br><br>

      <span class="C2"><code>CREATE VIEW</code></span>
      <span> – A view is a virtual table built from a SELECT statement. Think of it as saving a query with a name. Instead of rewriting complex queries, you create a view once and reuse it.</span><br><br>

      <span class="C3"><code>SELECT * FROM Brazil_Customers</code></span>
      <span> – Once created, a view behaves like a normal table. You can query it the same way. Behind the scenes, the database runs the original SELECT every time.</span><br><br>

      <span class="C4"><code>CREATE OR REPLACE VIEW</code></span>
      <span> – Updates an existing view definition. Instead of dropping and recreating it manually, this safely replaces it with the new version.</span><br><br>

      <span class="C5"><code>DROP VIEW</code></span>
      <span> – Deletes the view definition. It does NOT delete the underlying tables or data.</span><br><br>

      <strong>Notes:</strong><br>
      <span>
        - MySQL Date Types:<br>
        &nbsp;&nbsp;• DATE → YYYY-MM-DD<br>
        &nbsp;&nbsp;• DATETIME → YYYY-MM-DD HH:MM:SS<br>
        &nbsp;&nbsp;• TIMESTAMP → similar to DATETIME (auto-handled by server)<br>
        &nbsp;&nbsp;• YEAR → YYYY<br><br>

        - If your column is DATETIME and contains time (e.g., 2008-11-11 13:23:44), comparing only '2008-11-11' will return no results.<br>
        - To keep queries simple, avoid time components unless necessary.<br>
        - SQL Server differences: SQL Server has SMALLDATETIME and a different TIMESTAMP behavior (unique number).<br>
        - Views always show up-to-date data because they rerun the stored query every time.<br><br>

        - VIEW vs INDEX:<br>

        &nbsp;&nbsp;• VIEW = changes how data is PRESENTED.<br>
        &nbsp;&nbsp;&nbsp;&nbsp;(It is a saved SELECT query.)<br>

        &nbsp;&nbsp;• INDEX = changes how data is FOUND.<br>
        &nbsp;&nbsp;&nbsp;&nbsp;(It makes searching faster.)<br>

        &nbsp;&nbsp;&nbsp;&nbsp;A view affects what you see.<br>
        &nbsp;&nbsp;&nbsp;&nbsp;An index affects how fast the database finds it.
      </span><br><br>

      <strong>Concept & Spirit:</strong><br>
      <span>
        - Dates teach precision. Databases require exact formatting and matching — small differences (like time) matter.<br>
        - Views teach abstraction. You separate complex logic from usage, improving clarity and reusability.<br>
        - Big beginner lesson: Design for simplicity. Use DATE when you only need dates. Use views to simplify repeated logic. Clean structure = safer databases.
      </span>

    </div>

  </div>

<template> <!-- SQL: CREATE PROCEDURE, CALL and (CREATE PROCEDURE - safety practice) -->
  <div class="bubble">

    <h3>SQL: CREATE PROCEDURE, CALL and (CREATE PROCEDURE - safety practice)</h3>

    <!-- 0. TABLE EXAMPLE (Existing Data) -->
    <h3>Example: Customers Table Preview</h3>
    <table class="example" border="1" cellspacing="0" cellpadding="5">
      <tr>
        <th>CustomerID</th><th>CustomerName</th><th>City</th><th>PostalCode</th>
      </tr>
      <tr>
        <td>1</td><td>Anna Smith</td><td>London</td><td>WA1 1DP</td>
      </tr>
      <tr>
        <td>2</td><td>John Lee</td><td>Paris</td><td>75001</td>
      </tr>
      <tr>
        <td>3</td><td>Maria Garcia</td><td>London</td><td>WA1 1DP</td>
      </tr>
    </table>

    <!-- 1. SQL CODE -->
    <h3>SQL Code:</h3>
    <div class="code_block">
      <code>
        <!-- C1 Add Customer Procedure -->
        <span class="C6">DELIMITER //<br>
        <span class="C1">CREATE PROCEDURE AddCustomer(<br>
        &nbsp;&nbsp;IN cName VARCHAR(50),<br>
        &nbsp;&nbsp;IN cCity VARCHAR(50),<br>
        &nbsp;&nbsp;IN cPostal VARCHAR(10)<br>
        )<br>
        BEGIN<br>
        &nbsp;&nbsp;INSERT INTO Customers (CustomerName, City, PostalCode)<br>
        &nbsp;&nbsp;VALUES (cName, cCity, cPostal);<br>
        END</span><span class="C6"> //<br>
        DELIMITER ;</span><br><br>

        <!-- C2 Execute Add Customer -->
        <span class="C2">CALL AddCustomer('Liam Axelrod', 'Los Angeles', '90034');</span><br><br>

        <!-- C3 Delete Customer Procedure -->
        <span class="C6">DELIMITER //<br>
        <span class="C3">CREATE PROCEDURE DeleteCustomerByName(IN delName VARCHAR(50))<br>
        BEGIN<br>
        &nbsp;&nbsp;DELETE FROM Customers WHERE CustomerName = delName;<br>
        END</span><span class="C6"> //<br>
        DELIMITER ;</span><br><br>

        <!-- C4 Execute Delete Customer -->
        <span class="C4">CALL DeleteCustomerByName('John Lee');</span><br><br>

        <!-- C5 Unsafe SQL (Injection Example) -->
        <span class="C5">SELECT * FROM Users WHERE UserId = 105 OR 1=1;</span><br><br>

        <!-- C6 Safe Parameterized Query Concept -->
        <span class="C5">SELECT * FROM Users WHERE UserId = ?;</span>
      </code>
    </div>

    <!-- 2. EXAMPLE OUTPUT -->
    <h3>Example Output:</h3>

    <table class="example" border="1" cellspacing="0" cellpadding="5">
      <tr class="C2">
        <th>CustomerID</th><th>CustomerName</th><th>City</th><th>PostalCode</th>
      </tr>
      <tr>
        <td>1</td><td>Anna Smith</td><td>London</td><td>WA1 1DP</td>
      </tr>
      <tr>
        <td>2</td><td>John Lee</td><td>Paris</td><td>75001</td>
      </tr>
      <tr>
        <td>3</td><td>Maria Garcia</td><td>London</td><td>WA1 1DP</td>
      </tr>
    </table>

    <table class="example" border="1" cellspacing="0" cellpadding="5">
      <tr class="C4">
        <th>CustomerID</th><th>CustomerName</th><th>City</th><th>PostalCode</th>
      </tr>
      <tr>
        <td>1</td><td>Anna Smith</td><td>London</td><td>WA1 1DP</td>
      </tr>
      <tr>
        <td>3</td><td>Maria Garcia</td><td>London</td><td>WA1 1DP</td>
      </tr>
    </table>

    <!-- 3.1 EXPLANATION -->
    <h3>Explanation:</h3>
    <div class="explanation">

      <span class="C1"><code>CREATE PROCEDURE</code></span>
      <span> – Creates a reusable procedure in the database. Here, it inserts a new customer row. It’s like defining a function in other languages that performs an action.</span><br><br>

      <span class="C2"><code>CALL procedure_name()</code></span>
      <span> – Executes the procedure. Think of it like calling a function with arguments in JavaScript or Java.</span><br><br>

      <span class="C3"><code>DELETE FROM Customers WHERE CustomerName = delName</code></span>
      <span> – Deletes rows matching the input name. This demonstrates that procedures can modify data, not just read it, similar to a function that performs a side effect.</span><br><br>

      <span class="C4"><code>CALL DeleteCustomerByName('John Lee')</code></span>
      <span> – Runs the deletion procedure. After execution, any customer named "John Lee" is removed from the table.</span><br><br>

      <span class="C5"><code>OR 1=1</code></span>
      <span> – Classic SQL injection example. Shows how a hacker could get into your sensitive data by simply adding or true statement to trick the query into giving you all the data. <br>
      <span class="C5"><code>?</code> (Parameterized Query)</span> 
      <span>– Safe placeholder for user input. Prevents SQL injection by treating parameters strictly as data.</span><br><br>

        <span class="C5">DELIMITER #</span> 
        <span>– Changes how the query knows when the query ends. Usually we use ; to say the query statement has ended but in a procedure we need that so we change it for the procedure.</span><br><br>

      <!-- NOTES -->
      <strong>Notes:</strong><br>
      <span>
        - SQL Server uses <code>@param</code> style for procedure parameters.<br>
        - Procedures can perform INSERT, UPDATE, DELETE, or SELECT operations.<br>
        - Always avoid concatenating user input into queries. Use parameters/prepared statements.<br>
        - Deletion procedures show “side effects,” like functions that modify state in programming languages.
      </span><br><br>

      <!-- CONCEPT & SPIRIT -->
      <strong>Concept & Spirit:</strong><br>
      <span>
        - Procedures are like functions at the database level — reusable, maintainable, and capable of performing actions.<br>
        - They separate logic from application code, which improves security and maintainability.<br>
        - SQL injection demonstrates the importance of treating user input carefully.<br>
        - The big lesson: database code can be function-like, but always secure and well-structured.
      </span>

    </div>

  </div>

</template>

<template> <!-- SQL: Exploration / Hosting -->
  <div class="bubble">

    <h3>Exploration: SQL Hosting</h3>

    <div class="explanation">
      <span\>
        When building a website or web application that stores and retrieves data, your web server must access a 
        <strong>SQL database</strong>. This allows your app to read, write, and manage data efficiently.  
      </span><br><br>

      <span>
        <strong>Common SQL hosting options:</strong><br>
        - <strong>MS SQL Server:</strong> powerful, full-featured, suited for high-traffic and enterprise sites.<br>
        - <strong>Oracle:</strong> robust and high-performance, widely used for large-scale applications.<br>
        - <strong>MySQL:</strong> popular, flexible, inexpensive; ideal for most web apps. This is the style used in these notes.<br>
        - <strong>MS Access:</strong> simple and easy, suited for small or low-traffic websites. Not ideal for high-traffic apps.<br>
      </span><br>

      <span>
        <strong>Key concepts to consider:</strong><br>
        - Your web server must have proper access to the database; many hosting providers offer SQL-enabled plans.<br>
        - ANSI SQL compliance ensures core commands work similarly across different systems, though differences exist in syntax and data types.<br>
        - Choose a database based on traffic, complexity, cost, and required features: high-traffic → SQL Server/Oracle, general web apps → MySQL, small/simple apps → MS Access.<br>
      </span><br>

      <span>
        <strong>Analogy:</strong> Think of the web server as your office and the database as a filing cabinet:<br>
        - The office (web server) needs a key to access the cabinet (database).<br>
        - Some cabinets are large and powerful (Oracle, SQL Server), some are smaller and simpler (MS Access), and some are widely used and flexible (MySQL).<br>
      </span><br>

      <strong>Notes:</strong><br>
      <span>
        - This exploration is informational; no SQL code is involved here.<br>
        - MySQL / ANSI SQL style is used in examples throughout the notes, but other SQL systems are mentioned for context.<br>
        - Understanding hosting options helps guide which database system to practice with and deploy.<br>
      </span><br>

      <strong>Concept & Spirit:</strong><br>
      <span>
        - SQL Hosting is about context, not syntax: you don’t write SQL to host your database, but you must know the environment where your SQL runs.<br>
        - Knowing the tradeoffs (traffic capacity, cost, simplicity) shapes good decisions in database-backed applications.<br>
        - Early understanding of the database environment builds awareness of portability and compatibility between different SQL systems.
      </span>
    </div>

  </div>
